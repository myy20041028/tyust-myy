<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>摄像头控制</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 10px 18px;
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(148, 163, 184, 0.5);
      transform: translateX(-2px);
    }

    .main-container {
      display: flex;
      height: 100vh;
    }

    .control-panel {
      width: 280px;
      background: #1e293b;
      padding: 24px;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
    }

    .panel-title {
      font-size: 30px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 10px;
    }

    .device-select {
      width: 100%;
      padding: 12px 14px;
      background: #334155;
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .device-select:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .btn-start {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-start:hover {
      background: linear-gradient(135deg, #059669, #047857);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .btn-stop:hover {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-refresh {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .btn-refresh:hover {
      background: #475569;
      border-color: rgba(148, 163, 184, 0.5);
    }

    .video-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      padding: 20px;
    }

    .video-wrapper {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(148, 163, 184, 0.1);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 18px;
    }

    .placeholder i {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <button class="back-btn" id="backBtn">
    <i class="fas fa-arrow-left"></i> 返回主页
  </button>

  <div class="main-container">
    <div class="control-panel">
      <select id="cameraSelect" class="device-select"></select>
      <div class="btn-group">
        <button class="control-btn btn-start" id="startBtn">
          <i class="fas fa-video"></i> 打开摄像头
        </button>
        <button class="control-btn btn-stop" id="stopBtn">
          <i class="fas fa-video-slash"></i> 关闭摄像头
        </button>
        <button class="control-btn btn-refresh" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> 刷新设备
        </button>
      </div>
    </div>

    <div class="video-container">
      <h3 class="panel-title">摄像头画面</h3>
      <div class="video-wrapper">
        <div class="placeholder" id="placeholder">
          <i class="fas fa-video"></i>
          <p>摄像头未开启，请点击「打开摄像头」</p>
        </div>
        <video id="video" autoplay playsinline style="display: none;"></video>
      </div>
    </div>
  </div>

  <!-- 全部JS搬到外部文件 -->
  <script src="camera.js"></script>
</body>
</html>
